<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Document</title>
</head>
<body>
    <div class="container client_container">
        <div id="title">Aphasia Group Meeting</div>

        <div class="login_information">
            <input type="text" name="usernames" id="username" placeholder="username">
            <div id="join_container">
                <div id="login">Join Now!</div>
                <div class="icon" id="join_icon"></div>                
            </div>
        </div>

        <div class="role_options">
            <div class="a_role">
                <input type="radio" name="role" id="participant" checked="true">
                <label for="participant_icon" id="participant_icon_label">participant</label>            
                <div class="icon" id="participant_icon"></div>
            </div>
            <div class="a_role">
                <input type="radio" name="role" id="slp">
                <label for="slp_icon" id="slp_icon_label">Facilitator</label>                
                <div class="icon" id="slp_icon"></div>

            </div>
        </div>
    </div>
    <script src="js/variables.js"></script>
    <script src="js/login.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.1.2.min.js"></script>
